<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08080c">
<meta name="apple-mobile-web-app-title" content="Scheda">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Scheda Agostino</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#08080c;--card:#111116;--card2:#0e0e14;--border:#1a1a22;--accent:#e94560;--accent2:#ff6b6b;--green:#2dd4bf;--gold:#f0c040;--blue:#3b82f6;--text:#eee;--dim:#777;--dim2:#555;--dim3:#333}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',system-ui,-apple-system,sans-serif;min-height:100vh;min-height:100dvh;overscroll-behavior:none}
input[type="text"]{-webkit-appearance:none;appearance:none}
.hide{display:none!important}
.header{padding:52px 20px 12px;text-align:center;position:relative}
.header::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:350px;height:200px;background:radial-gradient(ellipse,rgba(233,69,96,0.08)0%,transparent 70%);pointer-events:none}
.header h1{font-size:32px;font-weight:900;letter-spacing:1px;background:linear-gradient(135deg,#fff 40%,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.1;margin-bottom:2px}
.header p{color:var(--dim2);font-size:11px;letter-spacing:3px;text-transform:uppercase;font-weight:500}
.page-toggle{display:flex;margin:0 16px 16px;background:var(--card);border-radius:12px;overflow:hidden;border:1px solid var(--border)}
.page-toggle button{flex:1;padding:11px 0;border:none;cursor:pointer;background:transparent;color:var(--dim2);font-size:13px;font-weight:700;font-family:inherit;transition:all .3s}
.page-toggle button.active{background:var(--accent);color:#fff}
.day-tabs{display:flex;gap:8px;padding:0 16px;margin-bottom:16px}
.day-tab{flex:1;padding:12px 6px;border-radius:14px;border:none;cursor:pointer;background:var(--card);color:#666;font-size:13px;font-weight:700;text-align:center;font-family:inherit;transition:all .3s}
.day-tab.active{background:linear-gradient(135deg,#e94560,#c22a42);color:#fff;box-shadow:0 4px 20px rgba(233,69,96,0.25)}
.day-tab small{display:block;font-size:9px;font-weight:500;opacity:.7;margin-top:2px}
.progress-wrap{padding:0 16px;margin-bottom:20px}
.progress-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.progress-info span{font-size:12px;color:var(--dim2)}
.progress-bar{height:3px;background:#151518;border-radius:2px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .5s;background:linear-gradient(90deg,#e94560,#ff6b6b)}
.progress-fill.done{background:var(--green)}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;margin-bottom:12px;transition:border-color .3s}
.ex-card.completed{border-color:rgba(45,212,191,0.35)}
.ex-card.stretch{background:linear-gradient(135deg,rgba(45,212,191,0.05),var(--card))}
.ex-head{padding:14px 16px;cursor:pointer;display:flex;align-items:flex-start;gap:8px}
.ex-head .info{flex:1}
.ex-name{font-weight:700;font-size:16px;color:#fff;margin-bottom:4px;display:flex;align-items:center;gap:6px}
.ex-card.stretch .ex-name{color:var(--green)}
.ex-check{color:var(--green);font-size:16px}
.ex-badge{display:inline-block;padding:3px 10px;border-radius:7px;font-size:12px;font-weight:700;margin-bottom:6px}
.ex-badge.red{background:rgba(233,69,96,0.1);color:var(--accent2)}
.ex-badge.teal{background:rgba(45,212,191,0.1);color:var(--green)}
.ex-note{color:var(--dim);font-size:13px;line-height:1.6}
.ex-arrow{color:var(--dim3);font-size:16px;flex-shrink:0;padding-top:2px}
.set-log{padding:0 16px 16px;border-top:1px solid var(--border)}
.set-rows{display:flex;flex-direction:column;gap:6px;margin-top:12px}
.set-header{display:flex;gap:8px;padding-left:36px;margin-bottom:2px}
.set-header span{flex:1;font-size:10px;color:var(--dim2);text-transform:uppercase;letter-spacing:1px;font-weight:600}
.set-row{display:flex;align-items:center;gap:8px}
.set-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#1a1a24;color:var(--dim2);font-size:12px;font-weight:700;flex-shrink:0;transition:all .3s}
.set-num.filled{background:var(--accent);color:#fff}
.set-input-wrap{position:relative;flex:1}
.set-input{width:100%;background:var(--card2);border:1px solid #222;border-radius:10px;padding:10px 32px 10px 12px;color:#fff;font-size:15px;outline:none;font-family:inherit}
.set-input:focus{border-color:var(--accent)}
.set-unit{position:absolute;right:10px;top:50%;transform:translateY(-50%);color:#444;font-size:11px;font-weight:600;pointer-events:none}
.set-prev{font-size:10px;color:#3a3a44;margin-top:2px;padding-left:2px;font-style:italic}
.timer-btn{width:100%;margin-top:14px;padding:13px 0;background:linear-gradient(135deg,#e94560,#c22a42);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.save-btn{width:100%;margin-top:20px;padding:16px 0;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.save-btn.blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff;box-shadow:0 4px 20px rgba(59,130,246,0.25)}
.save-btn.green{background:linear-gradient(135deg,#2dd4bf,#14b8a6);color:#000;box-shadow:0 4px 20px rgba(45,212,191,0.3)}
.section-title{font-size:15px;font-weight:700;margin-bottom:10px;padding-bottom:6px}
.section-title.gold{color:var(--gold);border-bottom:1px solid rgba(240,192,64,0.12);margin-top:28px}
.section-title.teal{color:var(--green);border-bottom:1px solid rgba(45,212,191,0.12);margin-top:28px}
.section-note{background:rgba(59,130,246,0.06);border-left:3px solid rgba(59,130,246,0.4);padding:12px 14px;border-radius:0 12px 12px 0;margin-bottom:14px;font-size:13px;color:var(--dim);line-height:1.6}
.fab{position:fixed;bottom:28px;right:20px;width:58px;height:58px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(135deg,#e94560,#c22a42);box-shadow:0 4px 24px rgba(233,69,96,0.35);color:#fff;font-size:22px;display:flex;align-items:center;justify-content:center;z-index:100}
.modal-overlay{position:fixed;inset:0;z-index:1000;background:rgba(6,6,10,0.92);backdrop-filter:blur(16px);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.modal-close{position:absolute;top:20px;right:20px;background:rgba(255,255,255,0.08);border:none;color:#999;font-size:20px;cursor:pointer;width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center}
.timer-options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;width:100%;max-width:320px}
.timer-opt{background:#131318;border:1px solid #222;border-radius:16px;padding:20px 0;color:#fff;font-size:20px;font-weight:700;cursor:pointer;font-family:inherit}
.timer-label{font-size:13px;color:#666;margin-bottom:24px;letter-spacing:3px;text-transform:uppercase;font-weight:600}
.save-modal{background:#131318;border:1px solid #222;border-radius:20px;padding:28px;max-width:340px;width:100%;text-align:center}
.save-modal h3{font-size:18px;margin-bottom:8px}
.save-modal p{font-size:13px;color:var(--dim);margin-bottom:24px;line-height:1.6}
.save-modal .btns{display:flex;gap:10px}
.save-modal .btns button{flex:1;padding:13px 0;border:none;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-cancel{background:rgba(255,255,255,0.06);color:#888}
.btn-confirm{background:linear-gradient(135deg,#2dd4bf,#14b8a6);color:#000;font-weight:700!important}
.dash-info{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.dash-info span{font-size:13px;color:#666}
.dash-info button{background:none;border:none;color:#444;font-size:11px;cursor:pointer;text-decoration:underline;font-family:inherit}
.filter-tabs{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.filter-tab{padding:8px 14px;border-radius:10px;border:none;cursor:pointer;white-space:nowrap;font-size:12px;font-weight:600;font-family:inherit;background:var(--card);color:#666}
.filter-tab.active{background:var(--accent);color:#fff}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden}
.dash-head{padding:14px 16px;cursor:pointer;display:flex;align-items:center;gap:10px}
.dash-name{font-weight:700;font-size:15px;color:#fff;margin-bottom:2px}
.dash-sub{font-size:11px;color:var(--dim2)}
.dash-kg{font-size:18px;font-weight:800;color:#fff;text-align:right}
.dash-kg small{font-size:11px;color:#666}
.dash-diff{font-size:11px;font-weight:600}
.dash-diff.up{color:var(--green)}
.dash-diff.down{color:var(--accent2)}
.dash-diff.same{color:#666}
.dash-detail{padding:0 16px 16px;border-top:1px solid var(--border)}
.dash-label{font-size:11px;color:var(--dim2);margin:12px 0 8px;text-transform:uppercase;letter-spacing:1px}
.table-wrap{border-radius:10px;overflow:hidden;border:1px solid var(--border)}
.table-head{display:flex;background:#0a0a0e;padding:8px 12px;gap:8px}
.table-head span{font-size:10px;color:var(--dim2);font-weight:600}
.table-row{display:flex;padding:10px 12px;gap:8px;border-top:1px solid #151518}
.table-row span{font-size:12px}
.col-date{flex:1.2;color:#aaa}
.col-val{flex:1;text-align:center}
.col-max{color:#fff;font-weight:700;font-size:13px!important}
.col-avg{color:#888;font-size:13px!important}
.del-confirm{background:rgba(233,69,96,0.08);border:1px solid rgba(233,69,96,0.2);border-radius:12px;padding:16px;margin-bottom:16px}
.del-confirm p{font-size:13px;color:var(--accent2);margin-bottom:10px}
.del-confirm .btns{display:flex;gap:8px}
.del-confirm .btns button{flex:1;padding:10px 0;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.empty-dash{padding:40px 20px;text-align:center}
.empty-dash .icon{font-size:48px;margin-bottom:16px}
.empty-dash h3{font-size:18px;font-weight:700;margin-bottom:8px}
.empty-dash p{font-size:13px;color:#666;line-height:1.6}
.content-area{padding:0 16px 180px}
</style>
</head>
<body>
<div class="header"><h1>SCHEDA AGOSTINO</h1><p>Workout Tracker</p></div>
<div class="page-toggle">
  <button id="tabWorkout" class="active" onclick="showPage('workout')">🏋️ Allenamento</button>
  <button id="tabDash" onclick="showPage('dashboard')">📊 Progressi</button>
</div>
<div id="workoutPage">
  <div class="day-tabs" id="dayTabs"></div>
  <div class="progress-wrap"><div class="progress-info"><span id="progressText"></span></div><div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div></div>
  <div class="content-area" id="exerciseList"></div>
</div>
<div id="dashPage" class="hide"></div>
<button class="fab" id="fabBtn" onclick="openTimer()">⏱</button>
<div class="modal-overlay hide" id="timerModal"><button class="modal-close" onclick="closeTimer()">✕</button><div id="timerContent"></div></div>
<div class="modal-overlay hide" id="saveModal"><div class="save-modal"><div style="font-size:40px;margin-bottom:12px">💾</div><h3 id="saveTitle"></h3><p>I dati verranno salvati nello storico e le caselle si svuoteranno per la prossima sessione.</p><div class="btns"><button class="btn-cancel" onclick="closeSave()">Annulla</button><button class="btn-confirm" onclick="confirmSave()">Salva</button></div></div></div>

<script>
const DAYS=[
{id:"day1",label:"Giorno 1",focus:"Petto · Dorso · Braccia",sections:[
{title:null,exercises:[
{id:"d1e1",name:"Panca Piana",sets:"4×6/8",n:4,note:"Devi arrivare all'ottava Rep quasi al limite dunque carica bene sta panca, mi raccomando avvicina le scapole abbassa le spalle, inarca la schiena e contrai l'addome."},
{id:"d1e2",name:"Chest Press",sets:"3×10",n:3,note:"Esecuzione esplosiva in allungamento, devi impiegare 3 secondi per tornare indietro (fase negativa)."},
{id:"d1e3",name:"Croci su Panca a 30°",sets:"3×8",n:3,note:"Mantieni il movimento controllato e la contrazione nel punto alto."},
{id:"d1e4",name:"Lat Machine",sets:"4×8",n:4,note:"Se in palestra hai la presa neutra utilizza quella altrimenti presa prona classica, mi raccomando attenzione il gomito, non portarlo dietro, cerca di mantenerlo quanto più dritto possibile."},
{id:"d1e5",name:"Row",sets:"3×10",n:3,note:"Mantieni la contrazione per 2 secondi e poi rilascia, qui mi raccomando tieni la schiena ferma e non farti trascinare dal peso, l'unica cosa che si muove è il gomito che deve essere mantenuto stretto vicino ai fianchi."},
{id:"d1e6",name:"Pulley Presa Larga",sets:"3×8",n:3,note:"Gomito vicino ai fianchi e stretto."}]},
{title:"⚡ Superset (da ripetere 3 volte)",titleClass:"gold",note:"Qui non c'è recupero tra gli esercizi! Nel curl e nel pushdown mantenere il gomito incastrato ai fianchi, non deve muoversi, alzare laterali mantenere il gomito leggermente piegato e face pull tirare verso la fronte.",exercises:[
{id:"d1e7",name:"Curl a Martello Manubri",sets:"×10",n:3,note:"Gomito incastrato ai fianchi, non deve muoversi."},
{id:"d1e8",name:"Pushdown Corda",sets:"×10",n:3,note:"Gomito incastrato ai fianchi, non deve muoversi."},
{id:"d1e9",name:"Alzate Laterali Manubri",sets:"×12",n:3,note:"Mantieni il gomito leggermente piegato."},
{id:"d1e10",name:"Face Pull",sets:"×12",n:3,note:"Tira verso la fronte."}]},
{title:"🧘 Stretching",titleClass:"teal",str:true,note:"Qui ti mando delle foto/video sui movimenti che devi fare.",exercises:[]}]},
{id:"day2",label:"Giorno 2",focus:"Gambe · Core",sections:[
{title:null,note:"Riscaldati bene! Vai in accosciata 10 sec ×3, mobilità anca con affondi profondi, spingi l'anca avanti ×10/gamba, scavalca un ostacolo con le gambe ×10, circonduzioni delle anche ×10/gamba.",exercises:[
{id:"d2e1",name:"Squat Multipower",sets:"4×8",n:4,note:"Scarica il peso sul tallone, non staccare mai da terra e mantieni la schiena dritta."},
{id:"d2e2",name:"Leg Extension + Leg Curl",sets:"10+10",n:3,note:"Mantieni l'esecuzione lenta e controllata sia in fase eccentrica che in fase concentrica, devi sentire bruciare."},
{id:"d2e3",name:"Affondi Camminati Zavorrati",sets:"3×12/gamba",n:3,note:"Prendi una sand bag da 20 kg mettila sulla schiena. Il ginocchio non supera la punta del piede, piede anteriore tutto poggiato a terra, posteriore sulla punta."},
{id:"d2e4",name:"Calf Raise",sets:"3×15",n:3,note:"Il polpaccio è stronzo da allenare! Per ogni Rep stai 5 secondi fermo in contrazione e scendi lentamente in 3 secondi."},
{id:"d2e5",name:"Plank",sets:"3×1 min",n:3,note:"Se non riesci fai 4×40 secondi."}]},
{title:"🧘 Stretching",titleClass:"teal",str:true,exercises:[
{id:"d2s1",name:"Allungamento Quadricipiti",sets:"30 sec",n:0,note:"Tieni la punta del piede con le mani da alzato, mantieni 30 secondi."},
{id:"d2s2",name:"Allungamento Bicipiti Femorali",sets:"30 sec",n:0,note:"Siediti e cerca di toccare le punte piano piano, migliorerai l'elasticità."},
{id:"d2s3",name:"Allungamento Polpacci",sets:"30 sec",n:0,note:"Punta del piede su un rialzo e il tallone basso che non poggia."},
{id:"d2s4",name:"Farfalla + Scorpion",sets:"30+20 sec",n:0,note:"Farfalla ×2 per 30 sec. Scorpion stretch 20 sec/gamba."}]}]},
{id:"day3",label:"Giorno 3",focus:"Postura · Dorso · Spalle",sections:[
{title:null,note:"Mobilità spalle: circonduzioni, dislocazioni con bastone, PVC ×20, around the world ×5/lato.",exercises:[
{id:"d3e1",name:"Trazioni",sets:"4×6/8",n:4,note:"Se non hai le trazioni usa un elastico legato alla sbarra e sotto i piedi."},
{id:"d3e2",name:"Rematore a T-Bar",sets:"4×8",n:4,note:"Se non c'è fai rematore con manubrio su panca a 45°."},
{id:"d3e3",name:"Pulley Basso Triangolo",sets:"3×10",n:3,note:"Mantieni 3 secondi di contrazione."},
{id:"d3e4",name:"Shoulder Press",sets:"3×8",n:3,note:"Se non c'è fai lento avanti con panca a 90 gradi."},
{id:"d3e5",name:"Rear Delts Fly",sets:"3×10",n:3,note:"Panca a 30°, petto appoggiato, braccia semi tese, spalle basse."},
{id:"d3e6",name:"Face Pull",sets:"3×12",n:3,note:"Fondamentale per la postura! Rimani in contrazione 2 secondi per ogni Rep."},
{id:"d3e7",name:"Curl Z Larga + Martello",sets:"3×10+ced.",n:3,note:"Carico a cedimento ~10 rep. Non esagerare col primo esercizio."},
{id:"d3e8",name:"Pushdown + Diamond PU",sets:"3×10+ced.",n:3,note:"Stessa modalità. Se non riesci le diamond, fai french press a cedimento."}]},
{title:"🧘 Stretching",titleClass:"teal",str:true,exercises:[
{id:"d3s1",name:"Mani dietro schiena",sets:"30 sec/lato",n:0,note:"Aggrappa una mano all'altra dietro la schiena, 30 sec per lato."},
{id:"d3s2",name:"Mani al muro",sets:"30 sec",n:0,note:"Mani al muro, distendi braccia, inclina la schiena."},
{id:"d3s3",name:"Allung. Addome",sets:"30 sec",n:0,note:"In ginocchio braccia avanti. Poi aiuto al sole: pancia giù, alza solo con le braccia."}]}]}
];
const ALL_EX=DAYS.flatMap(d=>d.sections.flatMap(s=>s.exercises.filter(e=>e.n>0).map(e=>({id:e.id,name:e.name,day:d.label}))));
let currentDay=0,currentPage="workout",logs={},history=[],openCards={},timerInterval=null,timerDuration=null,timerRemaining=0,audioCtx=null;
let dashFilter="all",dashOpen=null,dashShowDelete=false;

function load(){try{logs=JSON.parse(localStorage.getItem("gym-logs")||"{}")}catch{logs={}}try{history=JSON.parse(localStorage.getItem("gym-history")||"[]")}catch{history=[]}}
function saveLogs(){localStorage.setItem("gym-logs",JSON.stringify(logs))}
function saveHist(){localStorage.setItem("gym-history",JSON.stringify(history))}
function getLastSession(exId){for(let i=history.length-1;i>=0;i--)if(history[i].data[exId])return history[i].data[exId];return null}

function showPage(p){currentPage=p;document.getElementById("workoutPage").classList.toggle("hide",p!=="workout");document.getElementById("dashPage").classList.toggle("hide",p!=="dashboard");document.getElementById("tabWorkout").classList.toggle("active",p==="workout");document.getElementById("tabDash").classList.toggle("active",p==="dashboard");document.getElementById("fabBtn").classList.toggle("hide",p!=="workout");if(p==="dashboard")renderDashboard()}
function renderDayTabs(){document.getElementById("dayTabs").innerHTML=DAYS.map((d,i)=>'<button class="day-tab'+(i===currentDay?" active":"")+'" onclick="selectDay('+i+')"><div>'+d.label+'</div><small>'+d.focus+'</small></button>').join("")}
function selectDay(i){currentDay=i;renderDayTabs();renderExercises();renderProgress()}

function renderProgress(){
  const day=DAYS[currentDay],exs=day.sections.flatMap(s=>s.exercises.filter(e=>e.n>0));
  const cc=exs.filter(e=>{const s=logs[e.id];return s&&s.some(x=>x.kg||x.reps)}).length;
  const ad=exs.length>0&&exs.every(e=>{const s=logs[e.id];return s&&s.length===e.n&&s.every(x=>x.kg&&x.reps)});
  const pct=exs.length>0?cc/exs.length:0;
  const pt=document.getElementById("progressText");pt.textContent=ad?"✅ Giorno completato!":cc+"/"+exs.length+" esercizi";pt.style.color=ad?"#2dd4bf":"#555";
  const f=document.getElementById("progressFill");f.style.width=pct*100+"%";f.classList.toggle("done",ad);
}

function renderExercises(){
  const day=DAYS[currentDay],exs=day.sections.flatMap(s=>s.exercises.filter(e=>e.n>0));
  const hasData=exs.some(e=>{const s=logs[e.id];return s&&s.some(x=>x.kg||x.reps)});
  const ad=exs.length>0&&exs.every(e=>{const s=logs[e.id];return s&&s.length===e.n&&s.every(x=>x.kg&&x.reps)});
  let h="";
  day.sections.forEach(sec=>{
    if(sec.title)h+='<div class="section-title '+(sec.titleClass||"")+'">'+sec.title+'</div>';
    if(sec.note)h+='<div class="section-note">'+sec.note+'</div>';
    sec.exercises.forEach(ex=>{
      const hs=ex.n>0,sa=logs[ex.id]||[],dn=hs&&sa.length===ex.n&&sa.every(s=>s.kg&&s.reps),op=openCards[ex.id],is=!!sec.str,ls=getLastSession(ex.id);
      h+='<div class="ex-card'+(dn?" completed":"")+(is?" stretch":"")+'">';
      h+='<div class="ex-head" '+(hs?'onclick="toggleCard(\''+ex.id+'\')"':'')+'><div class="info"><div class="ex-name">'+(dn?'<span class="ex-check">✓</span>':"")+ex.name+'</div>';
      if(ex.sets)h+='<span class="ex-badge '+(is?"teal":"red")+'">'+ex.sets+'</span>';
      h+='<div class="ex-note">'+ex.note+'</div></div>';
      if(hs)h+='<span class="ex-arrow">'+(op?"▲":"▼")+'</span>';
      h+='</div>';
      if(op&&hs){
        const ar=logs[ex.id]||Array.from({length:ex.n},()=>({kg:"",reps:""}));
        h+='<div class="set-log"><div class="set-rows"><div class="set-header"><span>Peso</span><span>Reps</span></div>';
        for(let i=0;i<ex.n;i++){
          const s=ar[i]||{kg:"",reps:""},fl=s.kg&&s.reps,pk=ls&&ls[i]?ls[i].kg:"",pr=ls&&ls[i]?ls[i].reps:"";
          h+='<div class="set-row"><span class="set-num'+(fl?" filled":"")+'">'+(i+1)+'</span>';
          h+='<div class="set-input-wrap"><input class="set-input" type="text" inputmode="decimal" placeholder="—" value="'+s.kg+'" onchange="updateSet(\''+ex.id+'\','+i+',\'kg\',this.value)" onfocus="this.select()"><span class="set-unit">kg</span>'+(pk?'<div class="set-prev">prima: '+pk+'kg</div>':"")+'</div>';
          h+='<div class="set-input-wrap"><input class="set-input" type="text" inputmode="decimal" placeholder="—" value="'+s.reps+'" onchange="updateSet(\''+ex.id+'\','+i+',\'reps\',this.value)" onfocus="this.select()"><span class="set-unit">reps</span>'+(pr?'<div class="set-prev">prima: '+pr+'</div>':"")+'</div></div>';
        }
        h+='</div><button class="timer-btn" onclick="openTimer()">⏱ Timer Recupero</button></div>';
      }
      h+='</div>';
    });
  });
  if(hasData)h+='<button class="save-btn '+(ad?"green":"blue")+'" onclick="openSave()">💾 Salva '+day.label+'</button>';
  document.getElementById("exerciseList").innerHTML=h;
}

function toggleCard(id){openCards[id]=!openCards[id];renderExercises()}
function updateSet(exId,idx,field,val){
  val=val.replace(",",".");
  const dd=DAYS.find(d=>d.sections.some(s=>s.exercises.some(e=>e.id===exId)));
  const ed=dd.sections.flatMap(s=>s.exercises).find(e=>e.id===exId);
  if(!logs[exId])logs[exId]=Array.from({length:ed.n},()=>({kg:"",reps:""}));
  logs[exId][idx]={...logs[exId][idx],[field]:val};
  saveLogs();renderExercises();renderProgress();
}

function openSave(){document.getElementById("saveTitle").textContent="Salva "+DAYS[currentDay].label+"?";document.getElementById("saveModal").classList.remove("hide")}
function closeSave(){document.getElementById("saveModal").classList.add("hide")}
function confirmSave(){
  const day=DAYS[currentDay],exs=day.sections.flatMap(s=>s.exercises.filter(e=>e.n>0)),data={};
  exs.forEach(e=>{if(logs[e.id]&&logs[e.id].some(s=>s.kg||s.reps))data[e.id]=logs[e.id]});
  if(!Object.keys(data).length){closeSave();return}
  history.push({date:new Date().toISOString(),dayId:day.id,dayLabel:day.label,data});
  saveHist();exs.forEach(e=>delete logs[e.id]);saveLogs();closeSave();renderExercises();renderProgress();
}

function openTimer(){document.getElementById("timerModal").classList.remove("hide");renderTimerOptions()}
function closeTimer(){clearInterval(timerInterval);timerInterval=null;timerDuration=null;timerRemaining=0;document.getElementById("timerModal").classList.add("hide")}
function renderTimerOptions(){document.getElementById("timerContent").innerHTML='<div class="timer-label">Tempo di recupero</div><div class="timer-options">'+ [30,60,90,120,150,180].map(s=>'<button class="timer-opt" onclick="startTimer('+s+')">'+(s>=60?Math.floor(s/60)+":"+(s%60).toString().padStart(2,"0"):"0:"+s.toString().padStart(2,"0"))+"</button>").join("")+"</div>"}
function startTimer(s){timerDuration=s;timerRemaining=s;clearInterval(timerInterval);renderTimerCircle();timerInterval=setInterval(()=>{timerRemaining--;if(timerRemaining<=0){clearInterval(timerInterval);timerInterval=null;timerRemaining=0;try{navigator.vibrate?.([200,100,200,100,200])}catch{}beep()}renderTimerCircle()},1000)}
function beep(){try{if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.frequency.value=880;g.gain.value=0.3;o.start();o.stop(audioCtx.currentTime+0.3)}catch{}}
function resetTimer(){clearInterval(timerInterval);timerInterval=null;timerDuration=null;timerRemaining=0;renderTimerOptions()}
function renderTimerCircle(){
  const p=timerDuration?((timerDuration-timerRemaining)/timerDuration)*100:0,m=Math.floor(timerRemaining/60),s=timerRemaining%60,dn=timerDuration&&timerRemaining<=0,cl=dn?"#2dd4bf":"#e94560";
  document.getElementById("timerContent").innerHTML='<div style="position:relative;width:200px;height:200px;margin-bottom:32px"><svg width="200" height="200" style="transform:rotate(-90deg)"><circle cx="100" cy="100" r="90" fill="none" stroke="#1a1a24" stroke-width="6"/><circle cx="100" cy="100" r="90" fill="none" stroke="'+cl+'" stroke-width="6" stroke-linecap="round" stroke-dasharray="565" stroke-dashoffset="'+(565-565*p/100)+'" style="transition:stroke-dashoffset .8s linear"/></svg><div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">'+(dn?'<div style="font-size:22px;font-weight:700;color:#2dd4bf">VAI! 💪</div>':'<div style="font-size:48px;font-weight:800;font-variant-numeric:tabular-nums;color:#fff">'+m+":"+s.toString().padStart(2,"0")+"</div>")+'</div></div><button onclick="'+(dn?"closeTimer()":"resetTimer()")+'" style="background:'+(dn?"#2dd4bf":"rgba(255,255,255,0.08)")+";border:none;border-radius:50px;padding:14px 44px;color:"+(dn?"#000":"#aaa")+';font-size:15px;font-weight:700;cursor:pointer;font-family:inherit">'+(dn?"Chiudi":"Reset")+"</button>";
}

function getDP(exId){const pts=[];history.forEach(e=>{if(e.data[exId]){const s=e.data[exId],k=s.filter(x=>x.kg).map(x=>parseFloat(String(x.kg).replace(",","."))),r=s.filter(x=>x.reps).map(x=>parseInt(x.reps));if(k.length)pts.push({date:e.date,kg:Math.max(...k),avgKg:Math.round(k.reduce((a,b)=>a+b,0)/k.length*10)/10,reps:r.length?Math.round(r.reduce((a,b)=>a+b,0)/r.length):0})}});return pts}
function renderChart(dp){
  const W=280,H=100,P=28,mx=Math.max(...dp.map(d=>d.kg)),mn=Math.min(...dp.map(d=>d.kg)),rg=mx-mn||1;
  const xS=i=>P+(i/(dp.length-1))*(W-P*2),yS=v=>H-P-((v-mn)/rg)*(H-P*2);
  const pa=dp.map((d,i)=>(i===0?"M":"L")+xS(i)+","+yS(d.kg)).join(" ");
  let svg='<svg viewBox="0 0 '+W+" "+H+'" style="width:100%;height:auto"><defs><linearGradient id="ag" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#e94560" stop-opacity="0.25"/><stop offset="100%" stop-color="#e94560" stop-opacity="0"/></linearGradient></defs>';
  svg+='<line x1="'+P+'" y1="'+(H-P)+'" x2="'+(W-P)+'" y2="'+(H-P)+'" stroke="#1a1a22" stroke-width="1"/>';
  svg+='<text x="'+(P-2)+'" y="'+(P-6)+'" fill="#555" font-size="8">'+mx+'kg</text><text x="'+(P-2)+'" y="'+(H-P+14)+'" fill="#555" font-size="8">'+mn+'kg</text>';
  svg+='<path d="'+pa+" L"+xS(dp.length-1)+","+(H-P)+" L"+xS(0)+","+(H-P)+' Z" fill="url(#ag)"/>';
  svg+='<path d="'+pa+'" fill="none" stroke="#e94560" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>';
  dp.forEach((d,i)=>{svg+='<circle cx="'+xS(i)+'" cy="'+yS(d.kg)+'" r="3.5" fill="#e94560"/><text x="'+xS(i)+'" y="'+(yS(d.kg)-8)+'" fill="#bbb" font-size="7.5" text-anchor="middle" font-weight="600">'+d.kg+"</text>"});
  return svg+"</svg>";
}
function renderDashboard(){
  const c=document.getElementById("dashPage");
  if(!history.length){c.innerHTML='<div class="empty-dash"><div class="icon">📊</div><h3>Nessun dato ancora</h3><p>Completa un giorno di allenamento e premi "Salva Giorno" per iniziare a tracciare i tuoi progressi!</p></div>';return}
  const fe=dashFilter==="all"?ALL_EX:ALL_EX.filter(e=>e.day===dashFilter);
  let h='<div style="padding:0 16px 120px"><div class="dash-info"><span>'+history.length+' sessioni salvate</span><button onclick="toggleDel()">Cancella tutto</button></div>';
  if(dashShowDelete)h+='<div class="del-confirm"><p>Sei sicuro? Cancellerà tutti i progressi.</p><div class="btns"><button class="btn-cancel" onclick="toggleDel()">Annulla</button><button style="background:#e94560;color:#fff;font-weight:700" onclick="clearHist()">Cancella</button></div></div>';
  h+='<div class="filter-tabs">';["all","Giorno 1","Giorno 2","Giorno 3"].forEach(f=>{h+='<button class="filter-tab'+(dashFilter===f?" active":"")+'" onclick="setDF(\''+f+'\')">'+(f==="all"?"Tutti":f)+"</button>"});h+="</div>";
  fe.forEach(ex=>{
    const dp=getDP(ex.id);if(!dp.length)return;const io=dashOpen===ex.id,lk=dp[dp.length-1].kg,fk=dp[0].kg,df=Math.round((lk-fk)*10)/10;
    h+='<div class="dash-card"><div class="dash-head" onclick="toggleD(\''+ex.id+'\')"><div style="flex:1"><div class="dash-name">'+ex.name+'</div><div class="dash-sub">'+ex.day+" · "+dp.length+' sessioni</div></div><div style="text-align:right;flex-shrink:0"><div class="dash-kg">'+lk+'<small>kg</small></div>';
    if(dp.length>1)h+='<div class="dash-diff '+(df>0?"up":df<0?"down":"same")+'">'+(df>0?"↑":df<0?"↓":"=")+" "+Math.abs(df)+"kg</div>";
    h+='</div><span class="ex-arrow">'+(io?"▲":"▼")+"</span></div>";
    if(io){h+='<div class="dash-detail">';if(dp.length>=2)h+='<div class="dash-label">Peso massimo nel tempo</div>'+renderChart(dp);
    h+='<div class="dash-label">Storico dettagliato</div><div class="table-wrap"><div class="table-head"><span class="col-date">DATA</span><span class="col-val">MAX</span><span class="col-val">MEDIA</span><span class="col-val">REPS</span></div>';
    [...dp].reverse().forEach(d=>{const dt=new Date(d.date).toLocaleDateString("it-IT",{day:"2-digit",month:"short"});h+='<div class="table-row"><span class="col-date">'+dt+'</span><span class="col-val col-max">'+d.kg+'</span><span class="col-val col-avg">'+d.avgKg+'</span><span class="col-val col-avg">'+d.reps+"</span></div>"});
    h+="</div></div>"}h+="</div>"});h+="</div>";c.innerHTML=h;
}
function setDF(f){dashFilter=f;dashOpen=null;renderDashboard()}
function toggleD(id){dashOpen=dashOpen===id?null:id;renderDashboard()}
function toggleDel(){dashShowDelete=!dashShowDelete;renderDashboard()}
function clearHist(){history=[];saveHist();dashShowDelete=false;renderDashboard()}

// Register service worker
if('serviceWorker' in navigator){navigator.serviceWorker.register('./sw.js').catch(()=>{})}

load();renderDayTabs();renderExercises();renderProgress();
</script>
</body>
